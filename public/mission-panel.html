<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务面板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/mission-panel.css">
</head>
<body>
    <div class="mp-container">
        <header class="mp-header">
            <div class="mp-header-left">
                <button class="mp-back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> 返回</button>
                <div class="mp-title-group">
                    <h1 class="mp-title" id="mpMissionName">任务名称</h1>
                    <span class="mp-status" id="mpMissionStatus">进行中</span>
                </div>
            </div>
            <div class="mp-header-right">
                <button class="mp-action-btn" onclick="goManagerEdit()" title="编辑任务"><i class="fas fa-edit"></i> 编辑</button>
                <button class="mp-action-btn" onclick="goBack()"><i class="fas fa-times"></i> 关闭</button>
            </div>
        </header>

        <div class="mp-counters">
            <div class="mp-counter weather">
                <span class="mp-counter-label"><i class="fas fa-cloud-sun"></i> 天气</span>
                <span class="mp-counter-value" style="color:#888;">暂未实现</span>
            </div>
            <div class="mp-counter chaos">
                <span class="mp-counter-label"><i class="fas fa-random"></i> 混沌</span>
                <button class="mp-ctr-btn" onclick="adjustCounter('chaos', -1)">−</button>
                <span class="mp-counter-num" id="mpChaosValue">0</span>
                <button class="mp-ctr-btn" onclick="adjustCounter('chaos', 1)">+</button>
            </div>
            <div class="mp-counter scatter">
                <span class="mp-counter-label"><i class="fas fa-wave-square"></i> 逸散端</span>
                <button class="mp-ctr-btn" onclick="adjustCounter('scatter', -1)">−</button>
                <span class="mp-counter-num" id="mpScatterValue">0</span>
                <button class="mp-ctr-btn" onclick="adjustCounter('scatter', 1)">+</button>
            </div>
        </div>

        <div class="mp-tabs">
            <button class="mp-tab active" onclick="switchPanelTab('overview')">总览</button>
            <button class="mp-tab" onclick="switchPanelTab('board')">NPC / 地图</button>
            <button class="mp-tab" onclick="openMailModal()"><i class="fas fa-envelope"></i> 发邮件</button>
        </div>

        <div class="mp-tab-content active" id="mpTabOverview">
            <div class="mp-agents" id="mpAgents">
                <div class="mp-loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</div>
            </div>
        </div>

        <div class="mp-tab-content" id="mpTabBoard">
            <div class="board-layout">
                <div class="board-library">
                    <div class="lib-cat-tabs">
                        <button class="lib-cat-btn active" data-cat="npc" onclick="switchLibCategory('npc')">NPC</button>
                        <button class="lib-cat-btn" data-cat="map" onclick="switchLibCategory('map')">地图</button>
                        <button class="lib-footer-btn" onclick="showGmDiceHistory()" style="flex:0 0 auto;margin-left:auto;border-radius:4px;padding:2px 8px;font-size:10px;"><i class="fas fa-history"></i> 历史</button>
                    </div>
                    <div class="lib-folder-row">
                        <select id="libFolderSelect" onchange="switchLibFolder()" style="flex:1;padding:2px 4px;border:1px solid #d0d5dd;border-radius:3px;font-size:10px;background:#fff;color:#333;">
                            <option value="">全部</option>
                        </select>
                        <button onclick="createLibFolder()" style="padding:2px 6px;border:1px solid #d0d5dd;border-radius:3px;background:#fafafa;cursor:pointer;font-size:10px;color:#666;" title="新建文件夹">+</button>
                    </div>
                    <div class="library-list" id="imageLibList">
                        <div class="lib-empty">加载中...</div>
                    </div>
                    <div class="lib-footer">
                        <label class="lib-footer-btn" title="上传图片">
                            <i class="fas fa-upload"></i> 上传
                            <input type="file" accept="image/*" onchange="uploadImageToLib(event)" style="display:none">
                        </label>
                        <button class="lib-footer-btn" onclick="toggleConnectMode()" id="btnConnectMode"><i class="fas fa-project-diagram"></i> 连线</button>
                        <button class="lib-footer-btn" onclick="toggleConnections()" id="btnToggleConn"><i class="fas fa-link"></i> 隐藏</button>
                    </div>
                </div>
                <div class="board-canvas" id="boardCanvas"></div>
            </div>
        </div>
    </div>

    <!-- 邮件弹窗 -->
    <div id="mailModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:20000;align-items:center;justify-content:center;">
        <div style="background:white;border-radius:8px;max-width:480px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.2);display:flex;flex-direction:column;max-height:80vh;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #e8ebef;">
                <h3 style="margin:0;font-size:14px;color:#333;"><i class="fas fa-envelope"></i> 发送邮件</h3>
                <button onclick="closeMailModal()" style="background:none;border:none;font-size:18px;color:#999;cursor:pointer;">&times;</button>
            </div>
            <div style="padding:16px;overflow-y:auto;">
                <div style="margin-bottom:12px;">
                    <label style="display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:4px;">收件人</label>
                    <div id="mailRecipientList" style="max-height:140px;overflow-y:auto;border:1px solid #e0e3e8;border-radius:4px;padding:6px 10px;"></div>
                    <div style="margin-top:4px;font-size:10px;color:#888;">
                        <label style="cursor:pointer;"><input type="checkbox" id="mailSelectAll" onchange="toggleSelectAllRecipients()" checked> 全选</label>
                    </div>
                </div>
                <div style="margin-bottom:12px;">
                    <label style="display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:4px;">标题</label>
                    <input type="text" id="mailSubject" placeholder="邮件标题" style="width:100%;padding:6px 10px;border:1px solid #d0d5dd;border-radius:4px;font-size:13px;box-sizing:border-box;">
                </div>
                <div style="margin-bottom:12px;">
                    <label style="display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:4px;">内容</label>
                    <textarea id="mailContent" placeholder="输入邮件内容..." style="width:100%;min-height:100px;padding:8px;border:1px solid #d0d5dd;border-radius:4px;font-size:13px;resize:vertical;box-sizing:border-box;"></textarea>
                </div>
            </div>
            <div style="display:flex;justify-content:flex-end;gap:8px;padding:12px 16px;border-top:1px solid #e8ebef;">
                <button onclick="closeMailModal()" style="padding:6px 14px;border:1px solid #d0d5dd;border-radius:4px;background:#fafafa;cursor:pointer;font-size:12px;color:#666;">取消</button>
                <button onclick="sendMail()" style="padding:6px 14px;border:none;border-radius:4px;background:#8e44ad;color:white;cursor:pointer;font-size:12px;font-weight:700;"><i class="fas fa-paper-plane"></i> 发送</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/common.js"></script>
    <script src="js/board-core.js"></script>
    <script src="js/mission-panel.js"></script>
</body>
</html>
